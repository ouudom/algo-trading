# =============================================================================
# Nginx reverse proxy for AlgoTrader
# Place at: /etc/nginx/sites-available/algotrader
# Enable: sudo ln -s /etc/nginx/sites-available/algotrader /etc/nginx/sites-enabled/
#
# After enabling, run: sudo certbot --nginx -d yourdomain.com
# Certbot will automatically add the ssl_certificate lines below.
#
# Traffic routing:
#   /api/*  /health  /docs  /redoc  → FastAPI backend  (127.0.0.1:8000)
#   /*                              → Next.js frontend (127.0.0.1:3000)
# =============================================================================

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # ACME challenge passthrough for Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # SSL certificates — filled in automatically by Certbot
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    client_max_body_size 10M;

    # -------------------------------------------------------------------------
    # Backend — FastAPI (API, health check, Swagger docs)
    # -------------------------------------------------------------------------
    location ~ ^/(api|health|docs|redoc|openapi\.json) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (future live price streams)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # -------------------------------------------------------------------------
    # Frontend — Next.js
    # -------------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
