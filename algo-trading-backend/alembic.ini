# alembic.ini - Alembic migration configuration for AlgoTrader
#
# Run migrations:
#   alembic upgrade head
#   alembic revision --autogenerate -m "describe change"
#   alembic downgrade -1
#
# The DATABASE_URL is read from the environment (set in .env) via env.py.

[alembic]
# Path to the migration scripts directory
script_location = migrations

# Template used to generate new migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path addition for resolving imports inside env.py
prepend_sys_path = .

# Timezone used when stamping dates
# timezone = UTC

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to enable revision hashes in filenames
# revision_environment = false

# Set to 'true' to allow .pyc migration files to be used
# sourceless = false

# Version path separator; use os.pathsep for os-specific separator
# version_path_separator = os  # default: os.pathsep

# The output encoding for the migration scripts
# output_encoding = utf-8

# ---------------------------------------------------------------------------
# SQLAlchemy URL
# Overridden at runtime in migrations/env.py using settings.DATABASE_URL.
# The sync psycopg2 URL is used here for Alembic's offline mode only.
# ---------------------------------------------------------------------------
sqlalchemy.url = postgresql+psycopg2://algotrader:algotrader@localhost:5432/algotrader

[post_write_hooks]
# Post-write hook: auto-format generated migration files with black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
